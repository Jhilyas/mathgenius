[build]
  command = "npm install"
  publish = "public"
  functions = "functions"

# Map the chat endpoint specifically to the native streaming function
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# Map all other /api/* requests (like quiz) to the express serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200

# React-style SPA routing (serve index.html for all other paths)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
